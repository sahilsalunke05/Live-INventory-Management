{% extends "base.html" %}

{% block sidebar %}
    {% include "manager/sidebar.html" %}
{% endblock %}

{% block content %}
<style>
    /*FORM PAGE – ADD PRODUCT */

.form-card {
    background: #ffffff;
    border-radius: 12px;
    padding: 18px 20px;
    margin-top: 18px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    border: 1px solid #e2ebf8;
}

.form-card-title {
    font-size: 16px;
    font-weight: 600;
    color: #0d47a1;
    margin-bottom: 14px;
}

/* Grid for inputs */
.form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px 16px;
}

.form-group label {
    font-size: 13px;
    font-weight: 600;
    color: #444;
    margin-bottom: 4px;
}

.form-control {
    font-size: 14px;
    padding: 8px 10px;
    border-radius: 6px;
}

/* Button row */
.form-actions {
    margin-top: 16px;
    display: flex;
    justify-content: flex-end;
    gap: 10px;
}

/* CSV helper text */
.form-hint {
    font-size: 12px;
    color: #6b7280;
    margin-top: 4px;
    display: block;
}

/* Responsive */
@media (max-width: 768px) {
    .form-actions {
        justify-content: stretch;
    }

    .form-actions .btn {
        width: 100%;
    }
}
</style>
<div class="page-padding">

    <h1 class="page-title">Add Product</h1>
    <p class="page-subtitle">
        Add new products manually or upload them in bulk using CSV.
    </p>

    <!-- Manual Add -->
    <div class="form-card">
        <h4 class="form-card-title">📝 Manually Add Product</h4>

        <form method="POST">
            <input type="hidden" name="manual_submit" value="1">

            <div class="form-grid">
                <div class="form-group">
                    <label>Product Name</label>
                    <input class="form-control" type="text" name="name" required>
                </div>

                <div class="form-group">
                    <label>Price (₹)</label>
                    <input class="form-control" type="number" step="0.01" name="price" required>
                </div>

                <div class="form-group">
                    <label>Stock</label>
                    <input class="form-control" type="number" name="stock" required>
                </div>

            </div>

            <div class="form-actions">
                <button class="btn btn-success">
                    <i class="fas fa-plus-circle"></i> Add Product
                </button>
            </div>
        </form>
    </div>

    <!-- CSV Upload -->
    <div class="form-card">
        <h4 class="form-card-title">📂 Bulk Upload (CSV)</h4>

        <form method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label>Choose CSV File</label>
                <input class="form-control" type="file" name="csv_file" accept=".csv" required>
                <small class="form-hint">
                    CSV must include columns: name, price, stock
                </small>
            </div>

            <div class="form-actions">
                <button class="btn btn-primary">
                    <i class="fas fa-upload"></i> Upload CSV
                </button>
            </div>
        </form>
    </div>

</div>
{% endblock %}
