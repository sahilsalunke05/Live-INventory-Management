{% extends "base.html" %}
{% block sidebar %}
    {% include "manager/sidebar.html" %}
{% endblock %}

{% block content %}
<div class="container mt-4">
    <h3>Reactivate Product</h3>

    <form method="POST">
        <div class="mb-3">
            <label>Product</label>
            <input type="text" class="form-control" value="{{ product.name }}" disabled>
        </div>

        <div class="mb-3">
            <label>Enter New Stock</label>
            <label>Current Stock</label>
<input type="text"
       class="form-control"
       value="{{ product.stock }}"
       disabled>

<label class="mt-2">Add Stock</label>
<input type="number"
       name="stock"
       class="form-control"
       placeholder="Enter quantity to add"
       min="1"
       required>
        </div>

        <button type="submit" class="btn btn-success">Reactivate</button>
        <a href="{{ url_for('manager.view_products') }}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
