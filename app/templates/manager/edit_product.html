{% extends "base.html" %}

{% block sidebar %}
    {% include "manager/sidebar.html" %}
{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>Edit Product</h2>
    <form method="POST">
        <div class="form-group">
            <label for="name">Product Name</label>
            <input type="text" class="form-control" name="name" value="{{ product.name }}" required>
        </div>
        <div class="form-group mt-2">
            <label for="price">Price (₹)</label>
            <input type="number" step="0.01" class="form-control" name="price" value="{{ product.price }}" required>
        </div>
        <div class="form-group mt-2">
            <label for="stock">Stock</label>
            <label>Current Stock</label>
<input type="text"
       class="form-control"
       value="{{ product.stock }}"
       disabled>

<label class="mt-2">Add Stock</label>
<input type="number"
       name="stock"
       class="form-control"
       placeholder="Enter quantity to add"
       min="0">
        </div>
        <div class="form-group mt-2">
            <label for="unit">Unit</label>
            <select class="form-control" name="unit" required>
                <option value="pcs" {% if product.unit == 'pcs' %}selected{% endif %}>Pieces</option>
                <!-- <option value="kg" {% if product.unit == 'kg' %}selected{% endif %}>Kilograms</option>
                <option value="g" {% if product.unit == 'g' %}selected{% endif %}>Grams</option>
                <option value="litre" {% if product.unit == 'litre' %}selected{% endif %}>Litres</option>
                <option value="ml" {% if product.unit == 'ml' %}selected{% endif %}>Millilitres</option>
                <option value="pack" {% if product.unit == 'pack' %}selected{% endif %}>Pack</option> -->
            </select>
        </div>
        <button type="submit" class="btn btn-primary mt-3">Update Product</button>
    </form>
</div>
{% endblock %}
